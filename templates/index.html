<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Diabetes Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .full { grid-column: 1 / -1; }
        .submit { grid-column: 1 / -1; text-align: right; }
        .result { margin-top: 16px; font-weight: bold; font-size: 18px; border: 2px solid red; padding: 5px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Diabetes Prediction</h1>

    {% if prediction %}
    <div class="result">Hasil prediksi: {{ prediction }}</div><br><br>
    {% endif %}

    <form method="post" action="/predict">
        <div class="full">
            <label for="model">Model</label>
            <select id="model" name="model" required>
                {% for m in model_names %}
                <option value="{{ m }}">{{ m }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label>Pregnancies</label>
            <input type="number" name="pregnancies" required>
        </div>
        <div>
            <label>Glucose</label>
            <input type="number" name="glucose" required>
        </div>
        <div>
            <label>BloodPressure</label>
            <input type="number" name="blood_pressure" required>
        </div>
        <div>
            <label>SkinThickness</label>
            <input type="number" name="skin_thickness" required>
        </div>
        <div>
            <label>Insulin</label>
            <input type="number" name="insulin" required>
        </div>
        <div>
            <label>BMI</label>
            <input type="number" step="any" name="bmi" required>
        </div>
        <div>
            <label>DiabetesPedigreeFunction</label>
            <input type="number" step="any" name="diabetes_pedigree_function" required>
        </div>
        <div>
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="submit">
            <button type="submit" style="padding: 8px 20px;">Predict</button>
        </div>
    </form>
</body>
</html>
